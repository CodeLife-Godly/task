name: GDELT Sentiment Backfill

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run backfill (time-boxed)
        env:
          MAX_RUNTIME_MINUTES: "330"
        run: python -m preprocessing.build_news_sentiment 20160930 20260720

      - name: Commit and push progress
        run: |
          git config user.name "gdelt-backfill-bot"
          git config user.email "actions@github.com"
          git add data/datasets/news_sentiment.csv
          git diff --quiet --cached || git commit -m "Backfill GDELT sentiment progress"
          git push
